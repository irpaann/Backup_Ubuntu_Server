events {}

http {
    server {
        listen 80;
        server_name tugas-akhir.com www.tugas-akhir.com;

        # ==========================================
        # 1. Aplikasi Testing (User) - Dilindungi Auth
        # ==========================================
        location / {
            auth_request /internal_ip_check;

            proxy_pass http://user_app:5000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location = /internal_ip_check {
            internal; # Hanya boleh diakses secara internal oleh Nginx
            

            proxy_pass http://ml_engine:5000/api/blacklist/check?ip=$remote_addr;
            
            # Jangan teruskan body request asli ke auth server agar menghemat bandwidth
            proxy_pass_request_body off; 
            proxy_set_header Content-Length "";
            proxy_set_header X-Real-IP $remote_addr;
        }

        # ==========================================
        # 2. Endpoint khusus untuk Dashboard / Monitoring
        # ==========================================
        location /dashboard {
            proxy_pass http://ml_engine:5000; 
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # 3. Endpoint API (Abaikan atau tetap pasang sesuai kebutuhan)
        location /api {
            proxy_pass http://ml_engine:5000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}